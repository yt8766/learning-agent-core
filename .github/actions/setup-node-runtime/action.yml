name: Setup Node Runtime
description: Setup Node.js for lightweight repository scripts that do not need pnpm installation.

inputs:
  node-version:
    description: Node.js version to use.
    required: false
    default: '22'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: false
