name: Setup PNPM Workspace
description: Setup pnpm and Node.js for this workspace, with optional dependency installation.

inputs:
  node-version:
    description: Node.js version to use.
    required: false
    default: '22'
  install-dependencies:
    description: Whether to install workspace dependencies.
    required: false
    default: 'true'
  install-command:
    description: Command used to install workspace dependencies.
    required: false
    default: pnpm install --frozen-lockfile --prefer-offline

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install Dependencies
      if: ${{ inputs.install-dependencies == 'true' }}
      shell: bash
      run: ${{ inputs.install-command }}
