name: Main Full Validation

on:
  push:
    branches:
      - main

concurrency:
  group: main-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate And Build Main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/**/package.json', 'packages/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Restore Build Artifacts Cache
        uses: actions/cache@v4
        with:
          path: |
            apps/**/dist
            packages/**/build
          key: ${{ runner.os }}-artifacts-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/**/package.json', 'packages/**/package.json', 'scripts/**', 'apps/**/src/**', 'packages/**/src/**') }}
          restore-keys: |
            ${{ runner.os }}-artifacts-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint:eslint

      - name: Run Prettier
        run: pnpm lint:prettier

      - name: Run TypeScript Checks
        run: pnpm lint:tsc

      - name: Run Tests
        run: pnpm test

      - name: Run Full Build
        run: pnpm build

  notify:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs:
      - validate-and-build
    # job/step 的 if 表达式不能使用 secrets；用 run + env 注入后再写 outputs，供后续 if 使用
    if: always()

    steps:
      - name: Check SMTP secrets are configured
        id: smtp
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          if [ -n "$SMTP_SERVER" ] && [ -n "$SMTP_PORT" ] && [ -n "$SMTP_USERNAME" ] && \
             [ -n "$SMTP_PASSWORD" ] && [ -n "$SMTP_TO" ] && [ -n "$SMTP_FROM" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Success Email
        if: ${{ steps.smtp.outputs.ready == 'true' && needs.validate-and-build.result == 'success' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '[Main Success] ${{ github.repository }} @ ${{ github.ref_name }}'
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
          body: |
            Main branch full validation succeeded.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Failure Email
        if: ${{ steps.smtp.outputs.ready == 'true' && (needs.validate-and-build.result == 'failure' || needs.validate-and-build.result == 'cancelled') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '[Main Failure] ${{ github.repository }} @ ${{ github.ref_name }}'
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
          body: |
            Main branch full validation failed or was cancelled.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Job result: ${{ needs.validate-and-build.result }}
