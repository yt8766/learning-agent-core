name: Main Full Validation

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: main-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate And Build Main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/**/package.json', 'packages/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Restore Build Artifacts Cache
        uses: actions/cache@v4
        with:
          path: |
            apps/**/dist
            packages/**/build
          key: ${{ runner.os }}-artifacts-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/**/package.json', 'packages/**/package.json', 'scripts/**', 'apps/**/src/**', 'packages/**/src/**') }}
          restore-keys: |
            ${{ runner.os }}-artifacts-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint:eslint

      - name: Run Prettier
        run: pnpm lint:prettier

      - name: Run TypeScript Checks
        run: pnpm lint:tsc

      - name: Run Terminology Check (Non-blocking)
        run: pnpm check:terminology || true

      - name: Run Tests
        run: pnpm test

      - name: Run Coverage (Non-blocking Baseline Check)
        continue-on-error: true
        run: pnpm test:coverage

      - name: Run Backend Structure Check
        run: pnpm check:backend-structure

      - name: Run Full Build
        run: pnpm build

  prompt-regression:
    name: Prompt Regression Main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check prompt regression secrets are configured
        id: promptfoo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skip reason
        if: steps.promptfoo.outputs.ready != 'true'
        run: echo "Skipping prompt regression because OPENAI_API_KEY is not configured."

      - name: Setup pnpm
        if: steps.promptfoo.outputs.ready == 'true'
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: steps.promptfoo.outputs.ready == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        if: steps.promptfoo.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run Prompt Regression
        if: steps.promptfoo.outputs.ready == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm eval:prompts

      - name: Upload Prompt Regression Artifacts
        if: steps.promptfoo.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prompt-regression-main-${{ github.run_id }}
          path: |
            packages/evals/promptfoo/latest-promptfoo-results.json
            packages/evals/promptfoo/latest-summary.json
          if-no-files-found: error

  notify:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs:
      - validate-and-build
      - prompt-regression
    # job/step 的 if 表达式不能使用 secrets；用 run + env 注入后再写 outputs，供后续 if 使用
    if: always()

    steps:
      - name: Check SMTP secrets are configured
        id: smtp
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          if [ -n "$SMTP_SERVER" ] && [ -n "$SMTP_PORT" ] && [ -n "$SMTP_USERNAME" ] && \
             [ -n "$SMTP_PASSWORD" ] && [ -n "$SMTP_TO" ] && [ -n "$SMTP_FROM" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Success Email
        if: ${{ steps.smtp.outputs.ready == 'true' && needs.validate-and-build.result == 'success' && (needs.prompt-regression.result == 'success' || needs.prompt-regression.result == 'skipped') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '[Main Success] ${{ github.repository }} @ ${{ github.ref_name }}'
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
          body: |
            Main branch full validation succeeded.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Failure Email
        if: ${{ steps.smtp.outputs.ready == 'true' && (needs.validate-and-build.result == 'failure' || needs.validate-and-build.result == 'cancelled' || needs.prompt-regression.result == 'failure' || needs.prompt-regression.result == 'cancelled') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '[Main Failure] ${{ github.repository }} @ ${{ github.ref_name }}'
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
          body: |
            Main branch full validation failed or was cancelled.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Job result: ${{ needs.validate-and-build.result }}
