name: PR Incremental Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      packages: ${{ steps.filter.outputs.packages }}
      workflow: ${{ steps.filter.outputs.workflow }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      any_code: ${{ steps.filter.outputs.any_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Classify Changed Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            backend:
              - 'apps/backend/**'
              - 'apps/worker/**'
            packages:
              - 'packages/**'
            workflow:
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'scripts/**'
              - 'tsconfig*.json'
              - 'eslint.config.mjs'
              - 'prettier.config.js'
              - 'vitest.config.*'
            docs_only:
              - 'docs/**'
              - '*.md'
            any_code:
              - 'apps/**'
              - 'packages/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'scripts/**'
              - 'tsconfig*.json'
              - 'eslint.config.mjs'
              - 'prettier.config.js'
              - 'vitest.config.*'

  lint:
    name: Full Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint:eslint

      - name: Run Prettier
        run: pnpm lint:prettier

  typecheck:
    name: Full Typecheck
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript Checks
        run: pnpm lint:tsc

  test:
    name: Backend And Package Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.packages == 'true' || needs.detect-changes.outputs.workflow == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm test

  build:
    name: Build Changed Targets
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Frontend
        if: needs.detect-changes.outputs.frontend == 'true'
        run: pnpm build:frontend

      - name: Build Libraries And Backend
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.packages == 'true' || needs.detect-changes.outputs.workflow == 'true'
        run: pnpm build:lib && pnpm build:server

  notify:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lint
      - typecheck
      - test
      - build
    # job/step 的 if 表达式不能使用 secrets；用 run + env 注入后再写 outputs，供后续 if 使用
    if: always()

    steps:
      - name: Check SMTP secrets are configured
        id: smtp
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          if [ -n "$SMTP_SERVER" ] && [ -n "$SMTP_PORT" ] && [ -n "$SMTP_USERNAME" ] && \
             [ -n "$SMTP_PASSWORD" ] && [ -n "$SMTP_TO" ] && [ -n "$SMTP_FROM" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Success Email
        if: ${{ steps.smtp.outputs.ready == 'true' && needs.detect-changes.result == 'success' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') && (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped') && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '[PR Success] ${{ github.repository }} #${{ github.event.pull_request.number }}'
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
          body: |
            PR incremental validation succeeded.

            Repository: ${{ github.repository }}
            PR: #${{ github.event.pull_request.number }}
            Title: ${{ github.event.pull_request.title }}
            Branch: ${{ github.head_ref }} -> ${{ github.base_ref }}
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Failure Email
        if: ${{ steps.smtp.outputs.ready == 'true' && (needs.detect-changes.result == 'failure' || needs.detect-changes.result == 'cancelled' || needs.lint.result == 'failure' || needs.lint.result == 'cancelled' || needs.typecheck.result == 'failure' || needs.typecheck.result == 'cancelled' || needs.test.result == 'failure' || needs.test.result == 'cancelled' || needs.build.result == 'failure' || needs.build.result == 'cancelled') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '[PR Failure] ${{ github.repository }} #${{ github.event.pull_request.number }}'
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
          body: |
            PR incremental validation failed or was cancelled.

            Repository: ${{ github.repository }}
            PR: #${{ github.event.pull_request.number }}
            Title: ${{ github.event.pull_request.title }}
            Branch: ${{ github.head_ref }} -> ${{ github.base_ref }}
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Job results: ${{ toJson(needs) }}
