name: PR Incremental Validation

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      agents: ${{ steps.filter.outputs.agents }}
      packages: ${{ steps.filter.outputs.packages }}
      prompts: ${{ steps.filter.outputs.prompts }}
      workflow: ${{ steps.filter.outputs.workflow }}
      docs: ${{ steps.filter.outputs.docs }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      any_code: ${{ steps.filter.outputs.any_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Classify Changed Paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            backend:
              - 'apps/backend/**'
              - 'apps/worker/**'
            agents:
              - 'agents/**'
            packages:
              - 'packages/**'
            prompts:
              - 'agents/**/prompts/**'
              - 'packages/**/prompts/**'
              - 'apps/**/prompts/**'
              - 'packages/evals/promptfoo/**'
              - 'scripts/run-prompt-regression.js'
              - 'scripts/prompt-regression.js'
              - 'scripts/prompt-regression.d.ts'
            workflow:
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'scripts/**'
              - 'tsconfig*.json'
              - 'eslint.config.js'
              - 'prettier.config.js'
              - 'vitest.config.*'
            docs:
              - 'docs/**'
              - '**/*.md'
            docs_only:
              - 'docs/**'
              - '**/*.md'
            any_code:
              - 'apps/**'
              - 'agents/**'
              - 'packages/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'scripts/**'
              - 'test/**'
              - 'tsconfig*.json'
              - 'eslint.config.js'
              - 'prettier.config.js'
              - 'vitest.config.*'

  lockfile:
    name: Lockfile Sync
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_code == 'true' || needs.detect-changes.outputs.docs == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Fetch PR Base Ref
        uses: ./.github/actions/fetch-pr-base-ref
        with:
          base-ref: ${{ github.base_ref }}

      - name: Setup Workspace Tooling
        uses: ./.github/actions/setup-node-runtime

      - name: Check pnpm lockfile sync
        run: node ./scripts/check-lockfile-sync.js

  docs:
    name: Docs Check
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lockfile
    if: needs.detect-changes.outputs.docs_only == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node Runtime
        uses: ./.github/actions/setup-node-runtime

      - name: Run Docs Check
        run: node ./scripts/check-docs.js

  verify-foundation:
    name: Affected Verify / Governance And Spec
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lockfile
    if: needs.detect-changes.outputs.any_code == 'true'
    env:
      VERIFY_BASE_REF: origin/${{ github.base_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Fetch PR Base Ref
        uses: ./.github/actions/fetch-pr-base-ref
        with:
          base-ref: ${{ github.base_ref }}

      - name: Setup Workspace
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Run Governance Verify
        run: pnpm verify:governance

      - name: Run Affected Spec Verify
        run: pnpm test:spec:affected

  verify-parallel:
    name: Affected Verify / ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lockfile
      - verify-foundation
    if: needs.detect-changes.outputs.any_code == 'true'
    env:
      VERIFY_BASE_REF: origin/${{ github.base_ref }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Prettier
            command: pnpm lint:prettier:affected
          - label: ESLint
            command: pnpm lint:eslint:affected
          - label: Typecheck
            command: pnpm typecheck:affected
          - label: Unit
            command: pnpm test:unit:affected
          - label: Demo
            command: pnpm test:demo:affected
          - label: Integration
            command: pnpm test:integration:affected
          - label: Workspace Integration
            command: pnpm test:workspace:integration:affected
          - label: Workspace Smoke
            command: pnpm test:workspace:smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Fetch PR Base Ref
        uses: ./.github/actions/fetch-pr-base-ref
        with:
          base-ref: ${{ github.base_ref }}

      - name: Setup Workspace
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Run ${{ matrix.label }}
        run: ${{ matrix.command }}

  verify:
    name: Affected Verify
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lockfile
      - verify-foundation
      - verify-parallel
    if: ${{ always() && needs.detect-changes.outputs.any_code == 'true' }}

    steps:
      - name: Verify Parallel Gate Summary
        env:
          LOCKFILE_RESULT: ${{ needs.lockfile.result }}
          VERIFY_FOUNDATION_RESULT: ${{ needs.verify-foundation.result }}
          VERIFY_PARALLEL_RESULT: ${{ needs.verify-parallel.result }}
        run: |
          echo "lockfile=${LOCKFILE_RESULT}"
          echo "verify-foundation=${VERIFY_FOUNDATION_RESULT}"
          echo "verify-parallel=${VERIFY_PARALLEL_RESULT}"

          if [ "$LOCKFILE_RESULT" != "success" ] || [ "$VERIFY_FOUNDATION_RESULT" != "success" ] || [ "$VERIFY_PARALLEL_RESULT" != "success" ]; then
            echo "Affected verify prerequisites did not complete successfully."
            exit 1
          fi

  terminology:
    name: Terminology Check
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lockfile
      - verify-foundation
    if: needs.detect-changes.outputs.any_code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node Runtime
        uses: ./.github/actions/setup-node-runtime

      - name: Run Terminology Check (Non-blocking)
        run: node ./scripts/check-terminology.js || true

  prompt-regression:
    name: Prompt Regression
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lockfile
    if: needs.detect-changes.outputs.packages == 'true' || needs.detect-changes.outputs.prompts == 'true' || needs.detect-changes.outputs.workflow == 'true'
    env:
      VERIFY_BASE_REF: origin/${{ github.base_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Fetch PR Base Ref
        uses: ./.github/actions/fetch-pr-base-ref
        with:
          base-ref: ${{ github.base_ref }}

      - name: Check prompt regression secrets are configured
        id: promptfoo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skip reason
        if: steps.promptfoo.outputs.ready != 'true'
        run: echo "Skipping prompt regression because OPENAI_API_KEY is not configured."

      - name: Setup Workspace
        if: steps.promptfoo.outputs.ready == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Run Affected Prompt Regression
        if: steps.promptfoo.outputs.ready == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm eval:prompts:affected

      - name: Upload Prompt Regression Artifacts
        if: steps.promptfoo.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prompt-regression-pr-${{ github.event.pull_request.number || github.run_id }}
          path: |
            packages/evals/promptfoo/latest-promptfoo-results.json
            packages/evals/promptfoo/latest-summary.json
          if-no-files-found: error

  notify:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lockfile
      - docs
      - verify-foundation
      - verify-parallel
      - verify
      - terminology
      - prompt-regression
    # job/step 的 if 表达式不能使用 secrets；用 run + env 注入后再写 outputs，供后续 if 使用
    if: always()

    steps:
      - name: Check SMTP secrets are configured
        id: smtp
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          if [ -n "$SMTP_SERVER" ] && [ -n "$SMTP_PORT" ] && [ -n "$SMTP_USERNAME" ] && \
             [ -n "$SMTP_PASSWORD" ] && [ -n "$SMTP_TO" ] && [ -n "$SMTP_FROM" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize failure focus
        id: failure_focus
        if: always()
        env:
          DETECT_CHANGES_RESULT: ${{ needs.detect-changes.result }}
          LOCKFILE_RESULT: ${{ needs.lockfile.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          VERIFY_FOUNDATION_RESULT: ${{ needs.verify-foundation.result }}
          VERIFY_PARALLEL_RESULT: ${{ needs.verify-parallel.result }}
          VERIFY_RESULT: ${{ needs.verify.result }}
          TERMINOLOGY_RESULT: ${{ needs.terminology.result }}
          PROMPT_REGRESSION_RESULT: ${{ needs.prompt-regression.result }}
        run: |
          first_job="none"
          first_result="success"
          next_hint="No failed or cancelled jobs were detected."

          if [ "$DETECT_CHANGES_RESULT" = "failure" ] || [ "$DETECT_CHANGES_RESULT" = "cancelled" ]; then
            first_job="detect-changes"
            first_result="$DETECT_CHANGES_RESULT"
            next_hint="Inspect changed-path classification first to confirm the PR was routed into the expected validation jobs."
          elif [ "$LOCKFILE_RESULT" = "failure" ] || [ "$LOCKFILE_RESULT" = "cancelled" ]; then
            first_job="lockfile"
            first_result="$LOCKFILE_RESULT"
            next_hint="Check package.json and pnpm-lock.yaml drift first."
          elif [ "$DOCS_RESULT" = "failure" ] || [ "$DOCS_RESULT" = "cancelled" ]; then
            first_job="docs"
            first_result="$DOCS_RESULT"
            next_hint="Open the docs job and review markdown metadata, link, or docs structure errors."
          elif [ "$VERIFY_FOUNDATION_RESULT" = "failure" ] || [ "$VERIFY_FOUNDATION_RESULT" = "cancelled" ]; then
            first_job="verify-foundation"
            first_result="$VERIFY_FOUNDATION_RESULT"
            next_hint="Open verify-foundation and inspect governance plus affected spec logs first."
          elif [ "$VERIFY_PARALLEL_RESULT" = "failure" ] || [ "$VERIFY_PARALLEL_RESULT" = "cancelled" ]; then
            first_job="verify-parallel"
            first_result="$VERIFY_PARALLEL_RESULT"
            next_hint="Open the failing verify-parallel matrix leg and inspect prettier, eslint, type, unit, demo, or integration output."
          elif [ "$VERIFY_RESULT" = "failure" ] || [ "$VERIFY_RESULT" = "cancelled" ]; then
            first_job="verify"
            first_result="$VERIFY_RESULT"
            next_hint="Open the aggregate verify job for the final gate summary."
          elif [ "$TERMINOLOGY_RESULT" = "failure" ] || [ "$TERMINOLOGY_RESULT" = "cancelled" ]; then
            first_job="terminology"
            first_result="$TERMINOLOGY_RESULT"
            next_hint="Open terminology logs and review non-blocking repository wording drift."
          elif [ "$PROMPT_REGRESSION_RESULT" = "failure" ] || [ "$PROMPT_REGRESSION_RESULT" = "cancelled" ]; then
            first_job="prompt-regression"
            first_result="$PROMPT_REGRESSION_RESULT"
            next_hint="Open affected prompt regression logs and uploaded artifacts for the failing prompt case."
          fi

          echo "first_job=$first_job" >> "$GITHUB_OUTPUT"
          echo "first_result=$first_result" >> "$GITHUB_OUTPUT"
          echo "next_hint=$next_hint" >> "$GITHUB_OUTPUT"

      - name: Send Success Email
        if: ${{ steps.smtp.outputs.ready == 'true' && needs.detect-changes.result == 'success' && (needs.lockfile.result == 'success' || needs.lockfile.result == 'skipped') && (needs.docs.result == 'success' || needs.docs.result == 'skipped') && (needs.verify-foundation.result == 'success' || needs.verify-foundation.result == 'skipped') && (needs.verify-parallel.result == 'success' || needs.verify-parallel.result == 'skipped') && (needs.verify.result == 'success' || needs.verify.result == 'skipped') && (needs.terminology.result == 'success' || needs.terminology.result == 'skipped') && (needs.prompt-regression.result == 'success' || needs.prompt-regression.result == 'skipped') }}
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '✅ [PR Success] ${{ github.repository }} #${{ github.event.pull_request.number }}'
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
          body: |
            ✅ PR validation succeeded

            Summary:
            - Repository: ${{ github.repository }}
            - PR: #${{ github.event.pull_request.number }}
            - Title: ${{ github.event.pull_request.title }}
            - Branch: ${{ github.head_ref }} -> ${{ github.base_ref }}
            - Actor: ${{ github.actor }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Scope:
            - frontend: ${{ needs.detect-changes.outputs.frontend }}
            - backend: ${{ needs.detect-changes.outputs.backend }}
            - agents: ${{ needs.detect-changes.outputs.agents }}
            - packages: ${{ needs.detect-changes.outputs.packages }}
            - prompts: ${{ needs.detect-changes.outputs.prompts }}
            - workflow: ${{ needs.detect-changes.outputs.workflow }}
            - docs: ${{ needs.detect-changes.outputs.docs }}
            - docs_only: ${{ needs.detect-changes.outputs.docs_only }}

            Checks:
            - detect-changes: ${{ needs.detect-changes.result }}
            - lockfile: ${{ needs.lockfile.result }}
            - docs: ${{ needs.docs.result }}
            - verify-foundation: ${{ needs.verify-foundation.result }}
            - verify-parallel: ${{ needs.verify-parallel.result }}
            - verify: ${{ needs.verify.result }}
            - terminology: ${{ needs.terminology.result }}
            - prompt-regression: ${{ needs.prompt-regression.result }}

            Notes:
            - `Affected Verify` now closes as a pure aggregate gate, so the branch-protection check finishes earlier.
            - terminology stays visible as a separate lightweight job.

            Next step:
            - ✅ Merge or continue review from the PR page if no further action is needed.

      - name: Send Failure Email
        if: ${{ steps.smtp.outputs.ready == 'true' && (needs.detect-changes.result == 'failure' || needs.detect-changes.result == 'cancelled' || needs.lockfile.result == 'failure' || needs.lockfile.result == 'cancelled' || needs.docs.result == 'failure' || needs.docs.result == 'cancelled' || needs.verify-foundation.result == 'failure' || needs.verify-foundation.result == 'cancelled' || needs.verify-parallel.result == 'failure' || needs.verify-parallel.result == 'cancelled' || needs.verify.result == 'failure' || needs.verify.result == 'cancelled' || needs.terminology.result == 'failure' || needs.terminology.result == 'cancelled' || needs.prompt-regression.result == 'failure' || needs.prompt-regression.result == 'cancelled') }}
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '❌ [PR Failure] ${{ github.repository }} #${{ github.event.pull_request.number }}'
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          secure: ${{ secrets.SMTP_SECURE == 'true' }}
          body: |
            ❌ PR validation failed or was cancelled

            Summary:
            - Repository: ${{ github.repository }}
            - PR: #${{ github.event.pull_request.number }}
            - Title: ${{ github.event.pull_request.title }}
            - Branch: ${{ github.head_ref }} -> ${{ github.base_ref }}
            - Actor: ${{ github.actor }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Scope:
            - frontend: ${{ needs.detect-changes.outputs.frontend }}
            - backend: ${{ needs.detect-changes.outputs.backend }}
            - agents: ${{ needs.detect-changes.outputs.agents }}
            - packages: ${{ needs.detect-changes.outputs.packages }}
            - prompts: ${{ needs.detect-changes.outputs.prompts }}
            - workflow: ${{ needs.detect-changes.outputs.workflow }}
            - docs: ${{ needs.detect-changes.outputs.docs }}
            - docs_only: ${{ needs.detect-changes.outputs.docs_only }}

            Checks:
            - detect-changes: ${{ needs.detect-changes.result }}
            - lockfile: ${{ needs.lockfile.result }}
            - docs: ${{ needs.docs.result }}
            - verify-foundation: ${{ needs.verify-foundation.result }}
            - verify-parallel: ${{ needs.verify-parallel.result }}
            - verify: ${{ needs.verify.result }}
            - terminology: ${{ needs.terminology.result }}
            - prompt-regression: ${{ needs.prompt-regression.result }}

            Focus:
            - first non-success job: ${{ steps.failure_focus.outputs.first_job }}
            - result: ${{ steps.failure_focus.outputs.first_result }}
            - next hint: ${{ steps.failure_focus.outputs.next_hint }}

            First places to inspect:
            - ❌ Open the run page above and review the first failed or cancelled job.
            - If lockfile failed, check package.json and pnpm-lock.yaml drift first.
            - If verify-foundation failed, review governance and affected spec logs first.
            - If verify-parallel failed, inspect the failing prettier, eslint, type, unit, demo, or integration matrix leg.
            - If verify failed, review the aggregate gate summary.
            - If terminology failed, inspect the non-blocking terminology logs.
