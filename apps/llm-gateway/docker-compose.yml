services:
  llm-gateway-postgres:
    image: postgres:16
    container_name: learning-agent-llm-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llm_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-llm_gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in apps/llm-gateway/.env}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ${POSTGRES_DATA_DIR:-./.db/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
